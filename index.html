        // --- VERIFICACIÓN DE ESTADO DE APIS ---
        window.checkApiStatuses = () => {
            const updateCard = (id, status, text) => {
                const card = document.getElementById(id);
                if (!card) return;
                if (status === 'ok') color = 'var(--accent-green)';
                else if (status === 'warn') color = '#f59e0b';
                else if (status === 'error') color = 'var(--accent-red)';
                else if (status === 'loading') { color = 'var(--text-muted)'; text = 'Comprobando... <i class="fa-solid fa-spinner fa-spin"></i>'; }
                
                card.style.borderLeftColor = color;
                const valSpan = card.querySelector('.card-value');
                const iconI = card.querySelector('.card-icon');
                if (valSpan) { valSpan.innerHTML = text; valSpan.style.color = color; }
                if (iconI) { iconI.style.color = color; }
            };

            // Poner en estado de carga si se vuelve a llamar (al hacer clic)
            updateCard('statusJsonbin', 'loading');
            updateCard('statusImgbb', 'loading');
            updateCard('statusAd', 'loading');

            // 1. JSONBin (Base de Datos)
            fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, { method: 'GET', headers: { 'X-Master-Key': API_KEY } })
                .then(res => {
                    if (res.ok) updateCard('statusJsonbin', 'ok', 'En línea (OK)');
                    else updateCard('statusJsonbin', 'warn', `Alerta (${res.status})`);
                })
                .catch(e => updateCard('statusJsonbin', 'error', 'Fallo de Red'));

            // 2. ImgBB (Imágenes)
            const formData = new FormData();
            fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: formData })
                .then(res => {
                    if (res.status === 400 || res.ok) updateCard('statusImgbb', 'ok', 'En línea (OK)');
                    else updateCard('statusImgbb', 'warn', `Alerta (${res.status})`);
                })
                .catch(e => updateCard('statusImgbb', 'error', 'Fallo de Red'));

            // 3. AD Bridge (Servidor Local)
            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 3000); // 3 segundos máximo de espera
            fetch(`${AD_BRIDGE_URL}/api/ping`, { method: 'GET', signal: controller.signal })
                .then(res => {
                    clearTimeout(timeoutId);
                    if (res.ok) updateCard('statusAd', 'ok', 'En línea (OK)');
                    else updateCard('statusAd', 'warn', `Alerta (${res.status})`);
                })
                .catch(e => {
                    clearTimeout(timeoutId);
                    updateCard('statusAd', 'error', 'Desconectado');
                });
        };

        // Control de rate limiting para saveToCloud
        let cloudSaveTimeout = null;
        let isCloudSaving = false;

        async function saveToCloud() {
            // Evitar múltiples llamadas simultáneas
            if (isCloudSaving) return;

            // Debounce: esperar 2 segundos antes de guardar
            clearTimeout(cloudSaveTimeout);
            cloudSaveTimeout = setTimeout(async () => {
                const btn = document.querySelector('.btn-save-file');
                if (!btn) return; // Si no está en pantalla, no hacer nada
                
                const originalText = btn.textContent;
                btn.textContent = "Guardando...";
                btn.disabled = true;
                isCloudSaving = true;

                try {
                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 10000); // Timeout de 10 segundos

                    const response = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'X-Master-Key': API_KEY
                        },
                        body: JSON.stringify(db),
                        signal: controller.signal
                    });
                    clearTimeout(timeoutId);

                    if (response.ok) {
                        showToast("¡Base de datos actualizada en la nube correctamente!", "success");
                    } else if (response.status === 403) {
                        throw new Error("Acceso denegado (403). La API_KEY no tiene permisos o el BIN_ID es anónimo y de solo lectura.");
                    } else {
                        throw new Error(`Error del servidor al guardar (${response.status})`);
                    }
                } catch (error) {
                    console.error('Error en saveToCloud:', error);
                    if (error.name !== 'AbortError') {
                        showToast("⚠️ No se pudo guardar. Intente manualmente.", "warning");
                    }
                } finally {
                    if (btn) {
                        btn.textContent = originalText;
                        btn.disabled = false;
                    }
                    isCloudSaving = false;
                }
            }, 2000); // Esperar 2 segundos antes de guardar
        }

        // --- FUNCIONES DE MAPAS (HOISTED) ---
        function handleMapFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function(event) {
                const data = new Uint8Array(event.target.result);
                
                // Usamos ExcelJS en lugar de SheetJS
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(data.buffer);
                mapaWorkbook = workbook;
                
                const selector = document.getElementById('mapSheetSelect');

                });

        // --- CARGAR BASE DE DATOS DE EQUIPOS ---
        window.loadEquiposFile = async () => {
            try {
                // Usar File System Access API para obtener permiso de lectura/escritura directo
                const [fileHandle] = await window.showOpenFilePicker({
                    types: [{
                        description: 'Archivos Excel',
                        accept: {'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet': ['.xlsx']}
                    }]
                });
                
                equiposFileHandle = fileHandle; // Guardar el "puente" al archivo local
                const file = await fileHandle.getFile();
                const arrayBuffer = await file.arrayBuffer();
                const data = new Uint8Array(arrayBuffer);
                
                equiposWorkbook = new ExcelJS.Workbook();
                await equiposWorkbook.xlsx.load(data.buffer);
                
                baseEquipos = [];
                equiposHeadersMap = {};

                // Recorrer TODAS las hojas del archivo
                equiposWorkbook.eachSheet((worksheet) => {
                    let headers = [];
                    equiposHeadersMap[worksheet.name] = {};

                    // Mapear encabezados (Fila 1) de forma robusta
                    worksheet.getRow(1).eachCell((cell, colNumber) => {
                        let val = '';
                        if (cell.value && typeof cell.value === 'object') {
                            val = cell.value.result || (cell.value.richText && cell.value.richText.map(t=>t.text).join('')) || cell.value.toString();
                        } else if (cell.value !== null && cell.value !== undefined) {
                            val = cell.value.toString();
                        }
                        // Normalizamos los espacios en blanco
                        const headerName = val.trim().toUpperCase().replace(/\s+/g, ' ') || `COL_${colNumber}`;
                        headers[colNumber] = headerName;
                        equiposHeadersMap[worksheet.name][headerName] = colNumber;
                    });

                    // Leer datos
                    worksheet.eachRow((row, rowNumber) => {
                        if (rowNumber === 1) return; // Saltar fila de encabezados
                        let rowData = {};
                        row.eachCell({ includeEmpty: true }, (cell, colNumber) => {
                            let headerName = headers[colNumber];
                            if (headerName) {
                                let val = '';
                                if (cell.value && typeof cell.value === 'object') {
                                    if (cell.value instanceof Date) {
                                        // Manejar correctamente las fechas de Excel
                                        val = cell.value.toLocaleDateString('es-AR');
                                    } else {
                                        val = cell.value.result || (cell.value.richText && cell.value.richText.map(t=>t.text).join('')) || cell.value.toString();
                                    }
                                } else if (cell.value !== null && cell.value !== undefined) {
                                    val = cell.value.toString();
                                }
                                rowData[headerName] = val.trim();
                            }
                        });
                        // Guardar el nombre de la hoja y la fila para edición posterior
                        rowData['_SHEET'] = worksheet.name;
                        rowData['_ROW'] = rowNumber;
                        baseEquipos.push(rowData);
                    });
                });
                
                // Mostrar el botón de exportar como plan B si tiene permisos
                const btnExport = document.getElementById('btnExportarEquipos');
                if (btnExport && currentUser && (currentUser.role === 'admin' || currentUser.role === 'editor')) {
                    btnExport.style.display = 'inline-flex';
                }

                showToast(`Base de datos lista: ${baseEquipos.length} equipos conectados.`, "success");
                updateMapStatusLights();
            } catch (err) {
                if (err.name !== 'AbortError') {
                    console.error("Error cargando archivo:", err);
                    showToast("Error al abrir o navegador no soportado.", "error");
                }
            }
        };

        // Helper seguro para obtener valores de celda de ExcelJS sin romper la página
        function getCellValueSafe(cell) {
            if (!cell || cell.value === null || cell.value === undefined) return '';
            if (typeof cell.value === 'object') {
                if (cell.value.richText) {
                    return cell.value.richText.map(t => t.text).join('');
                }
                if (cell.value.result !== undefined) {
                    return cell.value.result.toString();
                }
                if (cell.value instanceof Date) {
                    return cell.value.toLocaleDateString('es-AR');
                }
            }
            return cell.value.toString();
        }

        function drawMap(sheetName) {
            if (!mapaWorkbook) return;
            lastMapSheet = sheetName; // Memorizar la hoja visitada para poder restaurarla luego
            const worksheet = mapaWorkbook.getWorksheet(sheetName);
            
            let html = '<table class="map-table">';
            
            // Pre-calcular celdas combinadas (merges) para aplicar colspan/rowspan
            const mergesMap = {};
            const skipCells = new Set();
            
            if (worksheet.model && worksheet.model.merges) {
                worksheet.model.merges.forEach(range => {
                    const [tl, br] = range.split(':');
                    const tlCell = worksheet.getCell(tl);
                    const brCell = worksheet.getCell(br);
                    
                    const rSpan = brCell.row - tlCell.row + 1;
                    const cSpan = brCell.col - tlCell.col + 1;
                    
                    mergesMap[`${tlCell.row}-${tlCell.col}`] = { rowspan: rSpan, colspan: cSpan };
                    
                    for (let r = tlCell.row; r <= brCell.row; r++) {
                        for (let c = tlCell.col; c <= brCell.col; c++) {
                            if (r === tlCell.row && c === tlCell.col) continue; // No saltar la maestra principal
                            skipCells.add(`${r}-${c}`);
                        }
                    }
                });
            }
            
            // Obtener dimensiones reales
            // Aseguramos un mínimo de cuadrícula si está vacío
            const rowCount = Math.max(worksheet.rowCount, 20);
            const colCount = Math.max(worksheet.columnCount, 15);

            // --- HEADER DE COLUMNAS (A, B, C...) ---
            html += '<thead><tr><th></th>'; // Esquina vacía
            for(let c = 1; c <= colCount; c++) {
                html += `<th onclick="selectMapColumn(this, event)">${toColumnName(c)}</th>`;
            }
            html += '</tr></thead><tbody>';

            // Iterar filas
            for(let r = 1; r <= rowCount; r++) {
                const row = worksheet.getRow(r);
                html += '<tr>';
                
                // --- HEADER DE FILA (1, 2, 3...) ---
                html += `<th onclick="selectMapRow(this, event)">${r}</th>`;
                
                // Iterar columnas
                for(let c = 1; c <= colCount; c++) {
                    if (skipCells.has(`${r}-${c}`)) continue;

                    const cell = row.getCell(c);
                    
                    // Obtener valor seguro
                    let val = getCellValueSafe(cell);

                    // --- INTERPRETAR ESTILOS DE EXCEL ---
                    let styleStr = '';
                    
                    // 1. Bordes (Arriba, Abajo, Izq, Der)
                    if (cell.border) {
                        if (cell.border.top) styleStr += `border-top: ${getBorderStyle(cell.border.top)}; `;
                        if (cell.border.bottom) styleStr += `border-bottom: ${getBorderStyle(cell.border.bottom)}; `;
                        if (cell.border.left) styleStr += `border-left: ${getBorderStyle(cell.border.left)}; `;
                        if (cell.border.right) styleStr += `border-right: ${getBorderStyle(cell.border.right)}; `;
                    }

                    // 2. Fondo (Fill)
                    if (cell.fill && cell.fill.type === 'pattern' && cell.fill.fgColor) {
                        let color = getExcelColor(cell.fill.fgColor);
                        if (color) styleStr += `background-color: ${color}; `;
                    }

                    // 3. Fuente (Font)
                    if (cell.font) {
                        if (cell.font.bold) styleStr += 'font-weight: bold; ';
                        if (cell.font.color) { let c = getExcelColor(cell.font.color); if(c) styleStr += `color: ${c}; `; }
                        if (cell.font.size) styleStr += `font-size: ${cell.font.size}pt; `;
                    }

                    let spanAttr = '';
                    if (mergesMap[`${r}-${c}`]) {
                        const m = mergesMap[`${r}-${c}`];
                        if (m.rowspan > 1) spanAttr += ` rowspan="${m.rowspan}"`;
                        if (m.colspan > 1) spanAttr += ` colspan="${m.colspan}"`;
                    }

                    // Renderizar celda con estilos inline
                    html += `<td${spanAttr} style="${styleStr}" data-row="${r}" data-col="${c}" onclick="selectMapCell(this, event)" ondblclick="editMapText(this)">${val}</td>`;
                }
                html += '</tr>';
            }
            html += '</tbody></table>';
            
            document.getElementById('mapTableContainer').innerHTML = html;
        }

        // Helper para convertir número a letra Excel (1->A, 27->AA)
        function toColumnName(num) {
            let ret = '', a = 1, b = 26;
            while ((num -= a) >= 0) {
                ret = String.fromCharCode(parseInt((num % b) / a) + 65) + ret;
                a = b;
                b *= 26;
            }
            return ret;
        }

        // Helpers para convertir estilos de Excel a CSS
        function getBorderStyle(borderObj) {
            // Excel styles: thin, medium, thick, dotted, etc.
            const width = borderObj.style === 'thick' ? '2px' : (borderObj.style === 'medium' ? '2px' : '1px');
            let color = '#000';
            if (borderObj.color) { const c = getExcelColor(borderObj.color); if(c) color = c; }
            return `${width} solid ${color}`;
        }

        function getExcelColor(colorObj) {
            if (!colorObj) return null;
            if (colorObj.argb) {
                // ARGB (Alpha Red Green Blue) -> CSS Hex. Ignoramos Alpha para simplificar o lo convertimos.
                return '#' + colorObj.argb.substring(2); 
            }
            return null;
        }

        // --- FUNCIONES DEL EDITOR DE PLANOS ---
        window.selectMapColumn = (th, event) => {
            // Gestión de selección múltiple (Ctrl / Cmd)
            if (!event.ctrlKey && !event.metaKey) {
                selectedMapCells.forEach(c => c.classList.remove('cell-selected'));
                selectedMapCells.clear();
            }
            
            const table = document.querySelector('.map-table');
            const colIndex = th.cellIndex;
            const rows = table.tBodies[0].rows;
            
            for(let i=0; i < rows.length; i++) {
                const cell = rows[i].cells[colIndex];
                if(cell) {
                    cell.classList.add('cell-selected');
                    selectedMapCells.add(cell);
                    if(i === 0 && !event.ctrlKey) selectedMapCell = cell; // Focus en la primera
                }
            }
        }

        window.selectMapRow = (th, event) => {
            if (!event.ctrlKey && !event.metaKey) {
                selectedMapCells.forEach(c => c.classList.remove('cell-selected'));
                selectedMapCells.clear();
            }
            
            const tr = th.parentElement;
            for(let i=1; i < tr.cells.length; i++) {
                const cell = tr.cells[i];
                cell.classList.add('cell-selected');
                selectedMapCells.add(cell);
                if(i === 1 && !event.ctrlKey) selectedMapCell = cell;
            }
        }

        window.selectMapCell = (td, event) => {
            // Evitar seleccionar encabezados (TH)
            if (td.tagName !== 'TD') return;

            // Gestión de selección múltiple (Ctrl / Cmd)
            if (!event.ctrlKey && !event.metaKey) {
                selectedMapCells.forEach(c => c.classList.remove('cell-selected'));
                selectedMapCells.clear();
            }

            if (selectedMapCells.has(td)) {
                td.classList.remove('cell-selected');
                selectedMapCells.delete(td);
                if (selectedMapCell === td) selectedMapCell = null;
            } else {
                td.classList.add('cell-selected');
                selectedMapCells.add(td);
                selectedMapCell = td;
            }
        }

        window.mapStructure = (action) => {
            if (!selectedMapCell) { alert("Selecciona una celda de referencia primero."); return; }
            const table = document.querySelector('.map-table');
            const currentRow = selectedMapCell.closest('tr');
            const cellIndex = selectedMapCell.cellIndex; // Ojo: index incluye el TH

            if (action === 'addRow') {
                const newRow = currentRow.cloneNode(true);
                Array.from(newRow.children).forEach(td => {
                    td.innerText = '';
                    td.style.backgroundColor = '';
                    td.className = '';
                    td.classList.remove('cell-selected');
                    td.onclick = (e) => selectMapCell(td, e);
                    td.ondblclick = () => editMapText(td);
                });
                currentRow.after(newRow);
                reindexTable();
            } 
            else if (action === 'delRow') {
                // Validar que no borre la única fila (tbody children)
                if(table.tBodies[0].rows.length > 1) currentRow.remove();
                selectedMapCell = null;
                selectedMapCells.clear();
                reindexTable();
            }
            else if (action === 'addCol') {
                Array.from(table.rows).forEach(row => {
                    const isHeader = row.parentElement.tagName === 'THEAD';
                    const refCell = row.cells[cellIndex];
                    const newCell = refCell.cloneNode(true);
                    newCell.innerText = '';
                    
                    if (!isHeader) {
                        newCell.style.backgroundColor = '';
                        newCell.className = '';
                        newCell.classList.remove('cell-selected');
                        newCell.onclick = (e) => selectMapCell(newCell, e);
                        newCell.ondblclick = () => editMapText(newCell);
                    }
                    refCell.after(newCell);
                });
                reindexTable();
            }
            else if (action === 'delCol') {
                // No borrar la columna de números (index 0)
                if (cellIndex === 0) return;
                
                const rows = Array.from(table.rows); // Incluye thead y tbody
                if (rows[0].cells.length > 2) { // Mínimo 1 col de datos + 1 header
                    rows.forEach(row => row.deleteCell(cellIndex));
                }
                selectedMapCell = null;
                selectedMapCells.clear();
                reindexTable();
            }
        }

        // Re-calcular letras y números después de editar estructura
        function reindexTable() {
            const table = document.querySelector('.map-table');
            if (!table) return;

            // 1. Reindexar Columnas (THEAD)
            const headerRow = table.tHead.rows[0];
            for (let c = 1; c < headerRow.cells.length; c++) {
                headerRow.cells[c].innerText = toColumnName(c);
            }

            // 2. Reindexar Filas (TBODY)
            const bodyRows = table.tBodies[0].rows;
            for (let r = 0; r < bodyRows.length; r++) {
                // La primera celda es el TH con el número
                bodyRows[r].cells[0].innerText = (r + 1).toString();
            }
        }

        window.applyMapStyle = (style) => {
            if (selectedMapCells.size === 0) { alert("Selecciona celdas para aplicar estilo."); return; }
            
            selectedMapCells.forEach(cell => {
                if (style === 'clear') {
                    cell.className = 'cell-selected'; // Mantener selección
                    cell.innerText = '';
                    cell.style.cssText = ''; // Limpiar estilos inline de Excel
                } else if (style === 'filled') {
                    cell.classList.toggle('filled');
                } else if (style === 'delete-text') {
                    cell.innerText = '';
                } else {
                    cell.classList.toggle(style);
                }
            });
        }

        window.editMapText = (td) => {
            const target = td || selectedMapCell;
            if (!target) return;
            
            target.contentEditable = true;
            target.focus();
            
            const finish = () => {
                target.contentEditable = false;
                target.onblur = null;
                target.onkeydown = null;
            };
            
            target.onblur = finish;
            target.onkeydown = (e) => { if(e.key === 'Enter') { e.preventDefault(); target.blur(); } };
        }

        function searchInMap() {
            const searchInputEl = document.getElementById('mapSearchInput');
            if (!searchInputEl) return;
            
            lastMapSearch = searchInputEl.value; // Memorizar búsqueda actual para restaurarla
            const query = searchInputEl.value.trim().toLowerCase();
            if (!query) return;
            
            // 1. BUSCAR EN LA DB DE EQUIPOS Y MOSTRAR TARJETA
            const infoContainer = document.getElementById('equiposInfoContainer');
            if (infoContainer) {
                infoContainer.innerHTML = ''; // Limpiar tarjeta previa
                
                // Comprobar si la base de datos está vacía o si se encontró el equipo
                if (baseEquipos.length === 0) {
                    infoContainer.innerHTML = `<div style="padding: 10px; color: #f59e0b; margin-bottom: 15px; border: 1px dashed #f59e0b; border-radius: 8px; background: rgba(245, 158, 11, 0.05);"><i class="fa-solid fa-database"></i> <b>Falta Base de Datos:</b> Sube el Excel de Inventario de Equipos (botón naranja) para ver la tarjeta de información.</div>`;
                } else {
                    const equipo = getEquipoByBox(query);
                    if (equipo) {
                        infoContainer.innerHTML = generateEquipmentCardHTML(equipo);
                    } else {
                        let html = `
                            <div style="padding: 15px; color: var(--accent-red); margin-bottom: 15px; border: 1px dashed var(--accent-red); border-radius: 8px; background: rgba(239, 68, 68, 0.05); display: flex; flex-direction: column; gap: 10px;">
                                <div><i class="fa-solid fa-triangle-exclamation"></i> No se encontró el equipo "<b>${query.toUpperCase()}</b>" en la base de datos de inventario cargada.</div>
                        `;
                        
                        const isEditor = currentUser && (currentUser.role === 'admin' || currentUser.role === 'editor');
                        if (isEditor) {
                            let sheetOptions = '';
                            equiposWorkbook.eachSheet(ws => {
                                sheetOptions += `<option value="${ws.name}">${ws.name}</option>`;
                            });

                            html += `
                                <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                                    <select id="newRecordSheet" class="cyber-select" style="width: auto; padding: 8px; margin: 0;" title="Elegir hoja de destino">
                                        ${sheetOptions}
                                    </select>
                                    <button onclick="createNewEquipmentRecord('${query.toUpperCase()}')" class="btn-action" style="background: rgba(6, 182, 212, 0.1); border: 1px solid var(--accent-cyan); color: var(--accent-cyan); padding: 8px 16px; font-size: 0.9rem;">
                                        <i class="fa-solid fa-plus"></i> Añadir a BdD
                                    </button>
                                </div>`;
                        }
                        
                        html += `</div>`;
                        infoContainer.innerHTML = html;
                    }
                }
            }

            // 2. BUSCAR EN EL PLANO VISUAL
            if (!mapaWorkbook) { 
                if (baseEquipos.length === 0) {
                    alert("Carga un plano o la base de datos de equipos primero."); 
                }
                return; 
            }
            
            document.querySelectorAll('.map-pc-resaltada').forEach(td => td.classList.remove('map-pc-resaltada'));

            let foundSheet = null;

            const escapedQuery = query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
            const regexWord = new RegExp(`\\b${escapedQuery}\\b`, 'i');

            // Buscar en todas las hojas con ExcelJS
            mapaWorkbook.eachSheet((ws) => {
                if (foundSheet) return;
                ws.eachRow((row) => {
                    if (foundSheet) return;
                    row.eachCell((cell) => {
                        if (foundSheet) return;
                        
                        let val = getCellValueSafe(cell);
                        
                        val = val.trim().toLowerCase();
                        if (val === query || regexWord.test(val)) {
                            foundSheet = ws.name;
                        }
                    });
                });
            });

            if (foundSheet) {
                // Si la encontramos, cambiamos y redibujamos
                const selector = document.getElementById('mapSheetSelect');
                if (selector.value !== foundSheet) {
                    selector.value = foundSheet;
                    drawMap(foundSheet); // Dibuja el mapa donde está la PC
                }

                // Buscar visualmente
                let domFound = false;
                document.querySelectorAll('.map-table td').forEach(td => {
                    const text = td.innerText.trim().toLowerCase();
                    if (text !== "" && (text === query || regexWord.test(text))) {
                        td.classList.add('map-pc-resaltada');
                        td.scrollIntoView({ behavior: 'smooth', block: 'center', inline: 'center' });
                        domFound = true;
                    }
                });
                
                if (!domFound) alert(`Se encontró en la hoja "${foundSheet}" pero no se pudo visualizar.`);
            } else {
                alert("No se encontró: " + query + " en ninguna hoja del archivo.");
            }
        }

        // --- Iniciar la aplicación ---
        initialize();
    });
    </script>
